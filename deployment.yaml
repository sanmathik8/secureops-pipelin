apiVersion: apps/v1
kind: Deployment

metadata:
  name: scanners

spec:
  replicas: 3

  selector:
    matchLabels:
      team: scanners

  template:
    metadata:
      labels:
        team: scanners

    spec:
      containers:
      - name: team-scanners
        image: scan:t1
        ports:
        - containerPort: 5000

---
apiVersion: v1
kind: Service

metadata:
  name: access-provider

spec:
  type: NodePort

  selector:
    team: scanners

  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30001
