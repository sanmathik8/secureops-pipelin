name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Secrets Detection
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source /repo \
            --no-git \
            --report-format json \
            --report-path /repo/gitleaks-report.json \
            --verbose || true

      - name: Semgrep - SAST
        run: |
          pip install semgrep
          semgrep --config=p/security-audit --error . || true

      - name: Build Docker Image
        run: docker build -t secureops:${{ github.sha }} .

      - name: Trivy - Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureops:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 0
          format: json
          output: trivy-report.json

      - name: Checkov - IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          soft_fail: true

      - name: Start App for DAST
        run: |
          docker run -d -p 5000:5000 \
            -v ${{ github.workspace }}/trivy-report.json:/app/trivy-report.json \
            secureops:${{ github.sha }}
          sleep 10

      - name: OWASP ZAP - DAST
        run: |
          docker run --network host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:5000 \
            -r zap-report.html || true

      - name: Parse Trivy Report
        if: always()
        run: python3 parse_trivy.py

      - name: Generate Security Report
        if: always()
        run: |
          echo "================================" > report.txt
          echo "  SECUREOPS SECURITY REPORT" >> report.txt
          echo "  Date: $(date)" >> report.txt
          echo "  Repo: ${{ github.repository }}" >> report.txt
          echo "  Branch: ${{ github.ref_name }}" >> report.txt
          echo "  Commit: ${{ github.sha }}" >> report.txt
          echo "================================" >> report.txt
          echo "" >> report.txt
          echo "[ GITLEAKS - Secrets Detection ]" >> report.txt
          cat gitleaks-report.json 2>/dev/null || echo "No secrets found" >> report.txt
          echo "" >> report.txt
          echo "[ TRIVY - Container Scan ]" >> report.txt
          cat trivy-summary.txt 2>/dev/null || echo "No trivy report" >> report.txt
          echo "" >> report.txt
          echo "[ CHECKOV - IaC Scan ]" >> report.txt
          echo "See annotations tab for details" >> report.txt
          echo "" >> report.txt
          echo "================================" >> report.txt
          echo "END OF REPORT" >> report.txt
          echo "================================" >> report.txt
          cat report.txt

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: report.txt

      - name: Create GitHub Issue on Critical Vulnerability
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('trivy-report.json')) return;
            const report = JSON.parse(fs.readFileSync('trivy-report.json'));
            let criticals = [];
            for (const result of report.Results || []) {
              for (const vuln of result.Vulnerabilities || []) {
                if (vuln.Severity === 'CRITICAL') {
                  criticals.push('- ' + vuln.VulnerabilityID + ': ' + vuln.PkgName + ' ' + vuln.InstalledVersion + ' -> ' + (vuln.FixedVersion || 'No fix'));
                }
              }
            }
            if (criticals.length > 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'CRITICAL Vulnerabilities Found - ' + new Date().toISOString().split('T')[0],
                body: '## Critical Vulnerabilities Detected\n\n' + criticals.join('\n') + '\n\n**Fix immediately!**',
                labels: ['security', 'critical']
              });
            }
