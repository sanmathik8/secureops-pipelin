apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secureops-app
  template:
    metadata:
      labels:
        app: secureops-app
    spec:
      containers:
      - name: secureops-app
        image: secureops-app
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: secureops-service
spec:
  selector:
    app: secureops-app:latest
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort
