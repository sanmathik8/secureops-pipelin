apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureops-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: secureops-app
  template:
    metadata:
      labels:
        app: secureops-app
    spec:
      containers:
      - name: secureops-app
        image: secureops-app:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: secureops-service
spec:
  type: NodePort
  selector:
    app: secureops-app
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30001
